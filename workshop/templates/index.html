{% load static %}

<!DOCTYPE html>
<html>

<head>
<title>Velocity Motors</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel = "icon" href = "{% static 'images/logo.png' %}" type = "image/x-icon"> 

<style>

body{
margin:0;
min-height:100vh;
background: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center center fixed;
background-size: cover;
font-family: 'Segoe UI', sans-serif;
}

/* dark overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* sidebar */

.sidebar{
height:100vh;
background:rgba(24, 24, 25, 0.7);
backdrop-filter: blur(8px);
padding:25px;
}

.sidebar a{
display:block;
color:#2e71ee;
padding:12px;
margin-bottom:10px;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.sidebar a:hover{
background:#2f49f1; 
color:rgb(255, 255, 255); 
}

/* cards */

.card{
background:rgba(28, 27, 27, 0.8);
backdrop-filter: blur(8px);
border:none;
border-radius:12px;
color: #2f49f1; 
box-shadow:0px 5px 20px rgba(0,0,0,0.5);
}

.stat-card{
padding:20px;
text-align:center; 
}

/* stat colors */

.stat-blue{
background:linear-gradient(135deg,#4477e6,#67c3ea);
}

.stat-green{
background:linear-gradient(135deg,#16a34a,#7ce1a1);
}

.stat-orange{
background:linear-gradient(135deg,#ea580c,#dd9460);
}

.stat-purple{
background:linear-gradient(135deg,#9333ea,#b280e4);
}

h2,h3,h4{
font-weight:600;
}

.card{

transition: transform 0.3s ease, box-shadow 0.3s ease;

}

.card:hover{

transform: translateY(-6px) scale(1.02);

box-shadow: 0px 10px 30px rgba(236, 75, 75, 0.7);

}

.sidebar a{

transition: all 0.3s ease;

}

.sidebar a:hover{

transform: translateX(6px);
background:#2e71ee;

} 

</style>

</head>

<script>

let lastX = 0;
let lastY = 0;
let lastTime = Date.now();

document.addEventListener("mousemove", function(e){

let now = Date.now();

let dx = e.clientX - lastX;
let dy = e.clientY - lastY;

let distance = Math.sqrt(dx*dx + dy*dy);
let speed = distance / (now - lastTime + 1);

createTrail(e.clientX, e.clientY, speed);

lastX = e.clientX;
lastY = e.clientY;
lastTime = now;

});

function createTrail(x,y,speed){

let trail = document.createElement("div");

trail.style.position = "fixed";
trail.style.left = x + "px";
trail.style.top = y + "px";

let size = Math.min(speed*40,20);

trail.style.width = size + "px";
trail.style.height = size + "px";

trail.style.background = "cyan";
trail.style.borderRadius = "50%";

trail.style.pointerEvents = "none";
trail.style.opacity = "0.7";
trail.style.transform = "translate(-50%,-50%)";

document.body.appendChild(trail);

setTimeout(()=>{
trail.remove();
},300);

}

</script>

<script>

const glow = document.createElement("div");

glow.style.position = "fixed";
glow.style.width = "200px";
glow.style.height = "200px";
glow.style.borderRadius = "50%";
glow.style.pointerEvents = "none";
glow.style.background = "radial-gradient(circle, rgba(0,255,255,0.4), transparent)";
glow.style.transform = "translate(-50%, -50%)";

document.body.appendChild(glow);

document.addEventListener("mousemove", (e)=>{

glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";

});

</script>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 sidebar">

<h3 class="text-info mb-4 d-flex align-items-center">

<img src="{% static 'images/logo.png' %}" 
width="100" 
height="100" 
style="margin-right:10px; border-radius:8px;">

<i>Velocity Motors</i> 

</h3>

<a href="/"><i>Dashboard</i></a>
<a href="/workorders/"><i>Work Orders</i></a>
<a href="/workorders/create/"><i>Create Work Order</i></a> 

</div>

<!-- Main Content -->

<div class="col-md-10 p-4">

{% block content %}

{% endblock %}

</div>

</div>

</div>

</body>

</html>
